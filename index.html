<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Reaction Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.9);
            --accent-color: #3b82f6;
            --text-color: #e5e7eb;
            --border-color: #374151;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Viewport Layer --- */
        #viewport {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000;
        }

        #videoBase {
            width: 100%;
            height: auto;
            max-height: 100%;
            transition: transform 0.2s ease-out; /* For vertical shifting */
            z-index: 1;
        }

        /* --- Resizable PIP Reaction Window --- */
        #pipContainer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            width: 320px;
            height: 180px;
            min-width: 160px;
            min-height: 90px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: #000;
            resize: both; /* Native Resizing Hook */
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #videoReact {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; /* Allows click-through for dragging handle */
        }

        /* --- Unified Master Controls --- */
        #masterControls {
            height: 80px;
            background: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 10px 20px;
            z-index: 20;
            transition: transform 0.3s ease;
        }

        #masterControls.hidden { transform: translateY(100%); }

        #seekBarContainer {
            width: 100%;
            margin-bottom: 10px;
        }

        #mainSeek {
            width: 100%;
            height: 6px;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .btn-group { display: flex; gap: 12px; align-items: center; }

        button {
            background: #27272a;
            border: 1px solid var(--border-color);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        button:hover { background: #3f3f46; border-color: var(--accent-color); }

        .time-display { font-family: monospace; font-size: 14px; opacity: 0.8; }

        /* --- Setup Modal & Settings --- */
        #setupModal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: #18181b;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            width: 400px;
            text-align: center;
        }

        .drop-zone {
            border: 2px dashed var(--border-color);
            padding: 40px 20px;
            margin: 20px 0;
            border-radius: 8px;
            cursor: pointer;
        }

        .hidden { display: none !important; }

        /* Settings Overlay */
        #settingsPanel {
            position: absolute;
            right: 20px;
            bottom: 100px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 10px;
            width: 250px;
            z-index: 30;
        }

        .setting-item { margin-bottom: 15px; }
        .setting-item label { display: block; font-size: 12px; margin-bottom: 5px; opacity: 0.7; }
        .setting-item input[type="range"] { width: 100%; }

    </style>
</head>
<body>

    <div id="setupModal">
        <div class="modal-content">
            <h2>Project Setup</h2>
            <p>Load your local files to begin syncing.</p>
            <div class="drop-zone" id="dropZone">
                <i class="fa-solid fa-cloud-arrow-up fa-2x"></i>
                <p>Drag & Drop Videos or Click to Browse</p>
            </div>
            <div id="fileStatus">
                <div class="status-item" id="baseStatus"><i class="fa-solid fa-circle-xmark"></i> Base Video</div>
                <div class="status-item" id="reactStatus"><i class="fa-solid fa-circle-xmark"></i> Reaction Video</div>
            </div>
            <button id="startProject" style="margin-top: 20px; width: 100%;" disabled>Launch Session</button>
        </div>
    </div>

    <main id="viewport">
        <video id="videoBase" preload="auto"></video>
        
        <div id="pipContainer">
            <video id="videoReact" preload="auto"></video>
        </div>

        <div id="settingsPanel" class="hidden">
            <h4 style="margin: 0 0 15px 0;">Session Settings</h4>
            
            <div class="setting-item">
                <label>Base Video Vertical Offset</label>
                <input type="range" id="vOffset" min="-50" max="50" value="0">
            </div>

            <div class="setting-item">
                <label>Subtitle Sync (± seconds)</label>
                <input type="number" id="subDelay" step="0.1" value="0" style="width: 60px; background: #000; color: white; border: 1px solid #444;">
            </div>

            <button id="changeSubs" style="width: 100%;">Replace Subtitle File</button>
        </div>
    </main>

    <footer id="masterControls">
        <div id="seekBarContainer">
            <input type="range" id="mainSeek" min="0" max="100" value="0" step="0.01">
        </div>

        <div class="control-row">
            <div class="btn-group">
                <button id="playPause"><i class="fa-solid fa-play"></i></button>
                <button id="syncNow" title="Sync Reaction to Current Time">S</button>
                <div class="time-display">
                    <span id="currentTime">00:00:00</span> / <span id="totalTime">00:00:00</span>
                </div>
            </div>

            <div class="btn-group">
                <span style="font-size: 11px;">Delay: <span id="delayDisplay" style="color: var(--accent-color)">0.00s</span></span>
                <i class="fa-solid fa-volume-high" style="font-size: 12px;"></i>
                <input type="range" id="baseVol" min="0" max="1" step="0.01" style="width: 60px;">
                <i class="fa-solid fa-comment-dots" style="font-size: 12px;"></i>
                <input type="range" id="reactVol" min="0" max="1" step="0.01" style="width: 60px;">
                <button id="toggleSettings"><i class="fa-solid fa-gear"></i></button>
            </div>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="vidsync.js"></script>
</body>
</html>
